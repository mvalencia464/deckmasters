# Cloudflare Pages — static site (Astro build → dist).
# Wrangler 4.x+ requires pages_build_output_dir for `wrangler pages deploy dist` to use this file.
# Project name must match Workers & Pages → your Pages project name (not necessarily the GitHub repo name).
# Override on the CLI: npx wrangler pages deploy dist --project-name=YOUR_ACTUAL_PROJECT_NAME
#
name = "deckmasters"
compatibility_date = "2026-03-06"
pages_build_output_dir = "dist"

# Do not add `[assets]` here — Cloudflare Pages rejects this block (Workers-only).
# Astro builds pure static files into `dist/` (no @astrojs/cloudflare worker bundle), so deploy
# does not merge a generated dist/server/wrangler.json that Pages rejects (ASSETS/KV/triggers).

# Do not put API keys or tokens here — this file is usually committed.
# Set the same variable names in:
#   • Local: `.env` (Astro/build) and optionally `.dev.vars` (Wrangler CLI)
#   • Production: Cloudflare Pages → Settings → Environment variables
#     (Production + Preview). Use "Encrypt" for secrets (e.g. HIGHLEVEL_TOKEN, DATAFORSEO_PASSWORD).

[[r2_buckets]]
binding = "IMG_BUCKET"
bucket_name = "img"
